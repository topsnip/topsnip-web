<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#0C0C0E"/>
  <!-- Signal bars (5 bars — the "topsnip" mark) -->
  <rect x="4" y="14" width="3.5" height="12" rx="1.5" fill="#E8734A" opacity="0.4"/>
  <rect x="9" y="9" width="3.5" height="17" rx="1.5" fill="#E8734A" opacity="0.65"/>
  <rect x="14" y="6" width="3.5" height="20" rx="1.5" fill="#E8734A"/>
  <rect x="19" y="10" width="3.5" height="16" rx="1.5" fill="#E8734A" opacity="0.65"/>
  <rect x="24" y="15" width="3.5" height="11" rx="1.5" fill="#E8734A" opacity="0.4"/>
  <!-- Snip line -->
  <line x1="2" y1="20" x2="30" y2="20" stroke="#0C0C0E" stroke-width="2.5" stroke-linecap="round"/>
</svg>
