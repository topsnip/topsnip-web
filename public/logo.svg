<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 36" fill="none">
  <!-- Signal mark (compact, 28x28) -->
  <rect x="0" y="0" width="28" height="28" rx="6" fill="#111111"/>
  <!-- Signal bars -->
  <rect x="3.5" y="13" width="3" height="10" rx="1.2" fill="#7C6AF7" opacity="0.4"/>
  <rect x="7.5" y="9" width="3" height="14" rx="1.2" fill="#7C6AF7" opacity="0.65"/>
  <rect x="11.5" y="6" width="3" height="17" rx="1.2" fill="#7C6AF7"/>
  <rect x="15.5" y="10" width="3" height="13" rx="1.2" fill="#7C6AF7" opacity="0.65"/>
  <rect x="19.5" y="14" width="3" height="9" rx="1.2" fill="#7C6AF7" opacity="0.4"/>
  <!-- Snip cut line -->
  <line x1="2" y1="19" x2="26" y2="19" stroke="#111111" stroke-width="2" stroke-linecap="round"/>
  <!-- Wordmark: "top" in light, "snip" in accent -->
  <!-- "top" -->
  <text x="36" y="22" font-family="Inter, -apple-system, sans-serif" font-weight="800" font-size="18" letter-spacing="-0.5" fill="#F0F0F0">top</text>
  <!-- "snip" -->
  <text x="72" y="22" font-family="Inter, -apple-system, sans-serif" font-weight="800" font-size="18" letter-spacing="-0.5" fill="#7C6AF7">snip</text>
</svg>
